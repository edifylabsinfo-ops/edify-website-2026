name: CI/CD Code Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kéo code từ repository về máy chủ GitHub Actions
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      # Bước 3: Cài đặt toàn bộ thư viện cần thiết
      - name: Install dependencies
        run: npm install

      # Bước 4: Chạy thử lệnh Build. 
      - name: Test Build (Vite)
        run: npm run build
